
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bughouse Fixed</title>

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

<style>
body{
background:#0b0b12;
color:white;
font-family:Arial;
text-align:center;
}
.container{
display:flex;
justify-content:center;
gap:40px;
margin-top:20px;
flex-wrap:wrap;
}
.boardBox{
width:340px;
}
</style>
</head>

<body>

<h2>Bughouse Online (Fixed)</h2>

<div>
<button onclick="createHost()">Host</button>
<button onclick="joinGuest()">Join</button>
</div>

<p id="status">Nicht verbunden</p>

<div class="container">

<div class="boardBox">
<h3>Brett A</h3>
<div id="boardA" style="width:340px"></div>
</div>

<div class="boardBox">
<h3>Brett B</h3>
<div id="boardB" style="width:340px"></div>
</div>

</div>

<script>

const SERVER = "wss://tandem-chess-server-production.up.railway.app";

let socket;
let role = null;

let gameA = new Chess();
let gameB = new Chess();

let boardA;
let boardB;

function initBoards(){

const orientationA = role === "host" ? "white" : "black";
const orientationB = role === "host" ? "black" : "white";

boardA = Chessboard('boardA',{
draggable:true,
position:'start',
orientation:orientationA,
onDrop:(source,target)=>handleMove("A",source,target)
});

boardB = Chessboard('boardB',{
draggable:true,
position:'start',
orientation:orientationB,
onDrop:(source,target)=>handleMove("B",source,target)
});

}

function connect(){

socket = new WebSocket(SERVER);

socket.onopen = ()=>{
document.getElementById("status").innerText="Verbunden als "+role;
socket.send(JSON.stringify({type:"join",role:role}));
};

socket.onmessage = (msg)=>{

const data = JSON.parse(msg.data);

if(data.type==="move"){
applyMove(data.board,data.move);
}

};

}

function createHost(){
role="host";
connect();
initBoards();
}

function joinGuest(){
role="guest";
connect();
initBoards();
}

function handleMove(board,source,target){

let game = board==="A"?gameA:gameB;

let move = game.move({
from:source,
to:target,
promotion:'q'
});

if(move===null) return 'snapback';

updateBoards();

socket.send(JSON.stringify({
type:"move",
board:board,
move:move
}));

}

function applyMove(board,move){

let game = board==="A"?gameA:gameB;

game.move(move);

updateBoards();

}

function updateBoards(){

boardA.position(gameA.fen());
boardB.position(gameB.fen());

}

</script>

</body>
</html>
