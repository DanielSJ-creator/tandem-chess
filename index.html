@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap');

/* \u2500\u2500 RESET & BASE \u2500\u2500 */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:      #08080f;
  --surf:    #0e0e1a;
  --card:    #13131f;
  --card2:   #18182a;
  --border:  #1e1e32;
  --border2: #2a2a45;
  --gold:    #c9a84c;
  --gold2:   #e8c97a;
  --gold-dim:#7a6030;
  --cream:   #f0ece0;
  --text:    #b8b4c8;
  --muted:   #4a4860;
  --red:     #e05555;
  --green:   #50c87a;
  --bLight:  #f0d9b5;
  --bDark:   #b58863;
}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* \u2500\u2500 APP SHELL \u2500\u2500 */
.app{min-height:100vh;display:flex;flex-direction:column;align-items:center;}

/* \u2500\u2500 HEADER \u2500\u2500 */
.hdr{
  width:100%;padding:14px 24px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  background:rgba(8,8,15,0.9);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:50;
}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;font-weight:600;
  color:var(--gold);letter-spacing:3px;
  text-transform:uppercase;
}
.logos{font-size:9px;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-top:2px;}

/* \u2500\u2500 SCREENS \u2500\u2500 */
.scr{flex:1;width:100%;max-width:540px;padding:22px 18px 36px;}

/* \u2500\u2500 SECTION TITLES \u2500\u2500 */
.stit{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:600;
  color:var(--cream);margin-bottom:4px;letter-spacing:.5px;
}
.ssub{font-size:12px;color:var(--muted);margin-bottom:22px;font-weight:300;}

/* \u2500\u2500 MODE GRID \u2500\u2500 */
.mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:0;}
@media(max-width:400px){.mgrid{grid-template-columns:1fr;}}

.mc{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px 16px 18px;
  cursor:pointer;
  transition:transform .2s ease, border-color .2s, box-shadow .2s;
  position:relative;overflow:hidden;
}
.mc::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(201,168,76,.04) 0%,transparent 60%);
  opacity:0;transition:opacity .2s;
  border-radius:14px;
}
.mc:hover{
  border-color:var(--border2);
  transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(201,168,76,.08);
}
.mc:hover::after{opacity:1;}
.mc:active{transform:translateY(-1px);}

/* icon box in card */
.mic{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;
  background:rgba(201,168,76,.07);
  border:1px solid rgba(201,168,76,.12);
}
.mtt{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;font-weight:600;
  color:var(--cream);margin-bottom:3px;letter-spacing:.3px;
}
.mdd{font-size:11px;color:var(--muted);line-height:1.5;font-weight:300;}

/* \u2500\u2500 BUTTONS \u2500\u2500 */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 20px;border-radius:8px;border:none;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;transition:all .2s;
}
.bp{
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);
  color:#08080f;
  box-shadow:0 4px 20px rgba(201,168,76,.3);
}
.bp:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(201,168,76,.4);}
.bp:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none;}
.bs{background:transparent;color:var(--text);border:1px solid var(--border2);}
.bs:hover{border-color:var(--gold);color:var(--gold);}
.bsm{padding:6px 12px;font-size:9px;}
.bk{
  display:flex;align-items:center;gap:5px;background:none;border:none;
  color:var(--muted);cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-size:12px;
  margin-bottom:16px;padding:0;transition:color .2s;
}
.bk:hover{color:var(--gold);}

/* \u2500\u2500 SECTION CARD \u2500\u2500 */
.sec{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;padding:18px;margin-bottom:12px;
}
.lbl{
  font-size:9px;color:var(--muted);
  text-transform:uppercase;letter-spacing:2.5px;
  font-family:'Space Grotesk',sans-serif;font-weight:500;
  margin-bottom:2px;
}

/* \u2500\u2500 OPTION BUTTONS \u2500\u2500 */
.ob{
  background:var(--surf);border:1px solid var(--border);
  border-radius:8px;padding:11px 8px;text-align:center;
  cursor:pointer;transition:all .2s;
}
.ob:hover,.ob.sl{border-color:var(--gold);background:rgba(201,168,76,.05);}
.ob.sl .om{color:var(--gold);}
.om{font-size:12px;font-weight:600;color:var(--cream);margin-bottom:2px;font-family:'Space Grotesk',sans-serif;}
.os{font-size:9px;color:var(--muted);}

/* \u2500\u2500 SLIDERS \u2500\u2500 */
.sr{display:flex;align-items:center;gap:10px;margin:8px 0;}
.slbl{font-size:9px;color:var(--muted);min-width:54px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;}
.sval{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gold);min-width:38px;text-align:right;font-weight:600;}
input[type=range]{-webkit-appearance:none;flex:1;height:2px;border-radius:2px;background:var(--border2);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 8px rgba(201,168,76,.4);}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--bg);}
.tc-tog{display:flex;gap:8px;margin:10px 0;}
.tc-op{flex:1;background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:all .2s;}
.tc-op:hover,.tc-op.sl{border-color:var(--gold);background:rgba(201,168,76,.06);}
.tc-op.sl .om{color:var(--gold);}

/* \u2500\u2500 BOARD AREA \u2500\u2500 */
.bwrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
.board{
  display:grid;grid-template-columns:repeat(8,1fr);
  border-radius:6px;overflow:hidden;
  box-shadow:0 0 0 2px rgba(201,168,76,.25), 0 20px 60px rgba(0,0,0,.8);
}
.cell{display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;user-select:none;}
.cL{background:var(--bLight);}.cD{background:var(--bDark);}
.cSel{background:rgba(201,168,76,.8)!important;}
.cDrp{position:relative;}.cDrp::after{content:'';position:absolute;inset:0;background:rgba(122,140,60,.38);pointer-events:none;z-index:1;}
.cMov::after{content:'';position:absolute;width:32%;height:32%;background:rgba(0,0,0,.22);border-radius:50%;pointer-events:none;z-index:1;}
.cCap::after{content:'';position:absolute;inset:0;border:4px solid rgba(0,0,0,.25);border-radius:50%;pointer-events:none;z-index:1;}
.cChk{background:rgba(220,55,55,.65)!important;}
.cLst{outline:3px solid rgba(201,168,76,.5);outline-offset:-3px;}
.cCas{background:rgba(80,130,220,.4)!important;}
.cfiles{display:flex;}.cf{text-align:center;font-size:9px;color:var(--muted);font-family:'Space Grotesk',sans-serif;}
.cranks{display:flex;flex-direction:column;position:absolute;left:-14px;top:0;height:100%;pointer-events:none;}
.cr{flex:1;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);font-family:'Space Grotesk',sans-serif;}

/* \u2500\u2500 CLOCKS \u2500\u2500 */
.clks{display:flex;gap:8px;width:100%;}
.clk{
  flex:1;background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;transition:all .2s;
}
.clk.ac{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.04);}
.clk.lw{border-color:var(--red);animation:blink 1s infinite;}
@keyframes blink{0%,100%{box-shadow:none}50%{box-shadow:0 0 14px rgba(220,85,85,.3)}}
.cn{font-size:9px;color:var(--muted);font-family:'Space Grotesk',sans-serif;letter-spacing:1.5px;text-transform:uppercase;}
.ct{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--cream);margin-top:2px;font-weight:300;letter-spacing:1px;}
.ct.ac{color:var(--gold);font-weight:400;}
.ct.lw{color:var(--red);}

/* \u2500\u2500 HAND PANEL \u2500\u2500 */
.hand{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;width:100%;}
.htit{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:10px;font-family:'Space Grotesk',sans-serif;}
.hpcs{display:flex;flex-wrap:wrap;gap:6px;}
.hpc{
  background:#1a1a28;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:8px;
  cursor:pointer;
  transition:all .15s;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  padding:4px;
}
.hpc:hover{border-color:rgba(255,255,255,.18);background:#222235;}
.hpc.sl{
  border-color:#e8a030;
  background:rgba(232,160,48,.12);
  box-shadow:0 0 10px rgba(232,160,48,.2);
}
.hpc.enemy{cursor:default;background:#141420;border-color:rgba(255,255,255,0.04);}
.hcnt{
  position:absolute;
  bottom:-5px;right:-5px;
  background:#e8501a;
  color:#fff;
  font-size:8px;font-weight:700;
  border-radius:50%;
  width:15px;height:15px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.5);
  font-family:'Space Grotesk',sans-serif;
}

/* \u2500\u2500 GAME STATUS BAR \u2500\u2500 */
.gbar{display:flex;gap:8px;width:100%;flex-wrap:wrap;}
.ic{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 13px;flex:1;min-width:88px;}
.il{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:3px;font-family:'Space Grotesk',sans-serif;}
.iv{font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--cream);font-weight:500;}
.iv.ac{color:var(--gold);}.iv.wr{color:var(--red);}.iv.gr{color:var(--green);}

/* \u2500\u2500 MOVE LIST \u2500\u2500 */
.mlist{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;width:100%;max-height:68px;overflow-y:auto;}
.mlt{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;font-family:'Space Grotesk',sans-serif;}
.mgr{display:flex;flex-wrap:wrap;gap:3px;}
.mt{background:var(--border);border-radius:4px;padding:2px 6px;font-size:9px;color:var(--text);font-family:'Space Grotesk',sans-serif;}
.mt.la{background:rgba(201,168,76,.15);color:var(--gold);}

/* \u2500\u2500 SYNC BADGE \u2500\u2500 */
.sync{
  background:rgba(80,200,122,.08);border:1px solid rgba(80,200,122,.3);
  border-radius:20px;padding:4px 10px;
  font-size:9px;color:var(--green);
  font-family:'Space Grotesk',sans-serif;font-weight:500;
  display:inline-flex;align-items:center;gap:5px;
}
.sd{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* \u2500\u2500 TANDEM BANNER \u2500\u2500 */
.tbann{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:8px 14px;width:100%;
  display:flex;align-items:center;justify-content:space-between;
  font-family:'Space Grotesk',sans-serif;font-size:10px;
}

/* \u2500\u2500 OVERLAY \u2500\u2500 */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.mod{
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:16px;padding:32px 28px;
  text-align:center;max-width:300px;width:90%;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
}
.mi2{font-size:42px;margin-bottom:12px;}
.mti{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--cream);margin-bottom:6px;font-weight:600;}
.msu{font-size:12px;color:var(--muted);margin-bottom:18px;font-weight:300;}
.mbt{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

hr{border:none;border-top:1px solid var(--border);margin:12px 0;}
input[type=text]{
  background:var(--surf);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;color:var(--cream);
  font-family:'Space Grotesk',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s;
}
input[type=text]:focus{border-color:var(--gold);}

/* \u2500\u2500 SCREEN PADDING (non-home) \u2500\u2500 */
.scr-inner{padding:20px 16px 40px;}
